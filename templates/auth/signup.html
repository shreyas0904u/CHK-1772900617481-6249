{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="max-width: 500px;">
    <h2 class="auth-title">Create an Account</h2>
    
    <form method="POST" action="{{ url_for('signup') }}">
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" required>
        </div>
        
        <div class="form-group">
            <label for="password">Create Password</label>
            <input type="password" id="password" name="password" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" class="form-input" required>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Log In</a>
    </p>
</div>
{% endblock %}
