<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Quiz - FinLit Youth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="antialiased bg-slate-900 text-slate-50 flex h-screen overflow-hidden">
    
    <!-- Background Decor -->
    <div class="fixed inset-0 pointer-events-none z-[-1]">
        <div class="bg-blob bg-blob-1" style="background: rgba(16, 185, 129, 0.2);"></div>
        <div class="bg-blob bg-blob-3" style="background: rgba(79, 70, 229, 0.15);"></div>
    </div>

    <!-- Sidebar (Same as dashboard) -->
    <aside class="w-64 glass-panel border-y-0 border-l-0 rounded-none h-full flex flex-col hidden md:flex flex-shrink-0 z-20 relative">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center">
                <i class="fa-solid fa-wallet text-white text-sm"></i>
            </div>
            <span class="font-heading font-bold text-lg text-white">FinLit<span class="text-secondary">Youth</span></span>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-2 no-scrollbar">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="quiz.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-purple-500/20 text-purple-300 font-medium">
                <i class="fa-solid fa-graduation-cap w-5"></i> Quiz Module
            </a>
            <a href="simulation.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-money-bill-trend-up w-5"></i> Simulations
            </a>
            <a href="spending-tracker.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-wallet w-5"></i> Spending Tracker
            </a>
            <a href="ai-mentor.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-robot w-5 text-cyan-400"></i> AI Mentor
            </a>
            <a href="leaderboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-trophy w-5 text-amber-400"></i> Leaderboard
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative z-10 overflow-y-auto w-full">
        <!-- Header -->
        <header class="glass-nav sticky top-0 z-30 px-6 py-4 flex items-center justify-between border-b border-white/10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-text-muted hover:text-white">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h1 class="text-xl font-heading font-semibold">Quiz Challenge</h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="px-3 py-1.5 rounded-full bg-emerald-500/20 border border-emerald-500/30 text-emerald-300 font-semibold text-sm">
                    +10 XP per correct answer
                </div>
            </div>
        </header>

        <div class="p-6 max-w-4xl mx-auto w-full pb-20 mt-8">
            
            <!-- Quiz Container -->
            <div id="quiz-container" class="glass-card p-8 relative">
                
                <!-- Progress Header -->
                <div class="flex justify-between items-center mb-6">
                    <div class="text-sm font-semibold text-text-muted tracking-wider uppercase">Question <span id="q-current" class="text-white">1</span> of <span id="q-total">10</span></div>
                    <div class="flex gap-1" id="q-dots">
                        <!-- Dots populated by JS -->
                    </div>
                </div>

                <!-- Question -->
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold font-heading mb-8 leading-tight">What is an emergency fund?</h2>

                <!-- Options -->
                <div id="options-container" class="space-y-4">
                    <!-- Options populated by JS -->
                </div>

                <!-- Explanation / Feedback Area (Hidden by default) -->
                <div id="feedback-area" class="hidden mt-8 p-5 rounded-xl border border-white/10 bg-slate-800/50 transform transition-all duration-300 opacity-0 translate-y-4">
                    <div class="flex items-start gap-4">
                        <div id="feedback-icon" class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-xl mt-1"></div>
                        <div>
                            <h3 id="feedback-title" class="text-lg font-bold mb-1">Correct!</h3>
                            <p id="feedback-desc" class="text-sm text-text-muted"></p>
                        </div>
                    </div>
                    <div class="mt-6 text-right">
                        <button id="next-btn" class="btn-primary">Next Question <i class="fa-solid fa-arrow-right ml-2"></i></button>
                    </div>
                </div>
            </div>

            <!-- Results Container (Hidden by default) -->
            <div id="results-container" class="glass-card p-10 text-center hidden transform transition-all duration-500 scale-95 opacity-0">
                <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(16,185,129,0.4)]">
                    <i class="fa-solid fa-check-double text-4xl text-white"></i>
                </div>
                
                <h2 class="text-3xl font-bold font-heading mb-2">Quiz Completed!</h2>
                <p class="text-text-muted mb-8">You've leveled up your financial knowledge.</p>
                
                <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-10">
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-white/5">
                        <div class="text-xs text-text-muted uppercase tracking-wider mb-1">Score</div>
                        <div class="text-3xl font-bold text-white"><span id="final-score">0</span><span class="text-lg text-text-muted">/10</span></div>
                    </div>
                    <div class="bg-indigo-500/20 rounded-xl p-4 border border-indigo-500/30">
                        <div class="text-xs text-indigo-300 uppercase tracking-wider mb-1">XP Earned</div>
                        <div class="text-3xl font-bold text-indigo-400">+<span id="final-xp">0</span></div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button onclick="location.reload()" class="btn-secondary">Try Again</button>
                    <a href="dashboard.html" class="btn-primary">Return to Dashboard</a>
                </div>
            </div>

        </div>
    </main>

    <script src="js/gamification.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
