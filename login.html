<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Financial Literacy for Youth</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation Library CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="antialiased overflow-hidden h-screen flex items-center justify-center">
    <!-- Decorative Background Shapes -->
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3" style="top: 20%; left: 80%;"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md px-6 relative z-10" data-aos="zoom-in" data-aos-duration="800">
        <div class="glass-panel p-8 sm:p-10 text-center">
            
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-wallet text-white text-3xl"></i>
                </div>
            </div>

            <h1 class="text-2xl font-bold font-heading mb-2 text-white">Welcome to <br> Financial Literacy for Youth</h1>
            <p class="text-text-muted text-sm mb-8">Master your money skills through play.</p>

            <!-- Mock Google Login Button -->
            <button id="googleLoginBtn" class="w-full bg-white text-gray-800 hover:bg-gray-100 py-3 px-4 rounded-xl flex items-center justify-center gap-3 font-semibold transition-all duration-300 shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google Logo">
                Continue with Google
            </button>

            <div class="mt-8 pt-6 border-t border-white/10">
                <p class="text-xs text-text-muted">
                    By logging in, you agree to our <a href="#" class="text-indigo-400 hover:underline">Terms of Service</a> and <a href="#" class="text-indigo-400 hover:underline">Privacy Policy</a>.
                </p>
            </div>
            
            <div class="mt-4">
                <a href="index.html" class="text-sm text-cyan-400 hover:text-cyan-300 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <!-- AOS Script -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
    
    <!-- Auth JS -->
    <script src="js/auth.js"></script>
</body>
</html>
