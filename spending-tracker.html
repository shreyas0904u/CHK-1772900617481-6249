<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending Tracker - FinLit Youth</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="antialiased bg-slate-900 text-slate-50 flex h-screen overflow-hidden">
    
    <!-- Background Decor -->
    <div class="fixed inset-0 pointer-events-none z-[-1]">
        <div class="bg-blob bg-blob-2" style="background: rgba(245, 158, 11, 0.1);"></div>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="w-64 glass-panel border-y-0 border-l-0 rounded-none h-full flex flex-col hidden md:flex flex-shrink-0 z-20 relative">
        <div class="p-6 border-b border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center">
                <i class="fa-solid fa-wallet text-white text-sm"></i>
            </div>
            <span class="font-heading font-bold text-lg text-white">FinLit<span class="text-secondary">Youth</span></span>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-2 no-scrollbar">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-chart-line w-5"></i> Dashboard
            </a>
            <a href="quiz.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-graduation-cap w-5"></i> Quiz Module
            </a>
            <a href="simulation.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-money-bill-trend-up w-5"></i> Simulations
            </a>
            <a href="spending-tracker.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-500/20 text-amber-300 font-medium">
                <i class="fa-solid fa-wallet w-5"></i> Spending Tracker
            </a>
            <a href="ai-mentor.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-robot w-5 text-cyan-400"></i> AI Mentor
            </a>
            <a href="leaderboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-trophy w-5 text-amber-400"></i> Leaderboard
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative z-10 overflow-y-auto w-full">
        <!-- Header -->
        <header class="glass-nav sticky top-0 z-30 px-6 py-4 flex items-center justify-between border-b border-white/10">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-text-muted hover:text-white">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h1 class="text-xl font-heading font-semibold">Spending Tracker</h1>
            </div>
            
            <button onclick="document.getElementById('expense-modal').classList.remove('hidden')" class="btn-accent px-4 py-2 text-sm">
                <i class="fa-solid fa-plus mr-1"></i> Add Expense
            </button>
        </header>

        <div class="p-6 max-w-7xl mx-auto w-full pb-20 mt-4">
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- Left Column: Charts -->
                <div class="lg:col-span-1 space-y-6">
                    <!-- Total Spend Card -->
                    <div class="glass-card p-6 flex flex-col items-center justify-center text-center">
                        <div class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-2">Total Expenses</div>
                        <div class="text-4xl font-bold font-heading text-white mb-1">₹<span id="total-spent-display">0</span></div>
                        <div class="text-xs text-indigo-300">This Month</div>
                    </div>

                    <!-- Category Pie Chart -->
                    <div class="glass-card p-6 relative">
                        <h3 class="font-bold mb-4">Spending by Category</h3>
                        <div class="relative w-full aspect-square max-h-[250px] mx-auto flex justify-center">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Transactions List -->
                <div class="lg:col-span-2">
                    <div class="glass-card p-6 h-full flex flex-col">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold">Recent Transactions</h3>
                            <button id="clear-data-btn" class="text-xs text-red-400 hover:text-red-300 transition-colors">Clear All</button>
                        </div>
                        
                        <!-- List -->
                        <div id="transactions-list" class="space-y-3 flex-1 overflow-y-auto pr-2 no-scrollbar">
                            <!-- Transactions populated here -->
                            <div class="text-center py-10 text-text-muted hidden" id="empty-state">
                                <i class="fa-solid fa-receipt text-4xl mb-3 opacity-50"></i>
                                <p>No expenses tracked yet.</p>
                                <p class="text-xs mt-1">Click 'Add Expense' to get started.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Full Width Monthly Trend Chart -->
            <div class="glass-card p-6 mt-6">
                <h3 class="font-bold mb-4">6-Month Trend Overview (Mock)</h3>
                <div class="w-full h-[250px]">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Modal for Adding Expense -->
    <div id="expense-modal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm hidden">
        <div class="glass-panel p-8 max-w-md w-full mx-4 shadow-2xl relative">
            <button onclick="document.getElementById('expense-modal').classList.add('hidden')" class="absolute top-4 right-4 text-text-muted hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>

            <h2 class="text-2xl font-bold font-heading mb-6">Add New Expense</h2>
            
            <form id="expense-form" class="space-y-4">
                <div>
                    <label class="block text-sm text-text-muted mb-1 ml-1 cursor-pointer">Amount (₹)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-muted font-bold">₹</span>
                        <input type="number" id="exp-amount" required min="1" class="glass-input pl-10 text-lg font-semibold" placeholder="0.00">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm text-text-muted mb-1 ml-1">Category</label>
                    <div class="relative select-wrapper">
                        <select id="exp-category" class="glass-input appearance-none block w-full bg-slate-800/80 cursor-pointer" required>
                            <option value="Food">🍔 Food & Dining</option>
                            <option value="Transport">🚕 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Rent">🏠 Rent & Utilities</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Family">👨‍👩‍👦 Money sent to parents</option>
                            <option value="Other">📝 Other</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-text-muted mb-1 ml-1 cursor-pointer">Date</label>
                    <input type="date" id="exp-date" required class="glass-input bg-slate-800/80 cursor-pointer [color-scheme:dark]">
                </div>

                <div class="pt-4">
                    <button type="submit" class="btn-primary w-full">Save Expense</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/gamification.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/expenses.js"></script>
</body>
</html>
